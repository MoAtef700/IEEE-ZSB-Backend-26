<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Register in UniCore</title>
    <link rel="stylesheet" href="unicore.css"/>
</head>  
<body>
    <header>
        <h1>Student Registration</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="register.html">Login</a>
            <a href="contact.html">Contact</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main>
        <form action="#" method="POST">
            <label for="fname">Full Name:</label><br>
            <input type="text" id="fname" name="fullname" required><br><br>

            <label for="u-email">Email:</label><br>
            <input type="email" id="u-email" name="email" required><br><br>

            <label for="u-pass">Password:</label><br>
            <input type="password" id="u-pass" name="password" required><br><br>

            <label for="u-date">Date of Birth:</label><br>
            <input type="date" id="u-date" name="date" required><br><br>

            <label for="u-dept">Department:</label><br>
            <select id="u-dept" name="department">
                <option value="CS">Computer Science (CS)</option>
                <option value="IT">Information Technology (IT)</option>
                <option value="IS">Information Systems (IS)</option>
            </select><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="m" name="gender" value="male">
            <label for="m">Male</label>
            <input type="radio" id="f" name="gender" value="female">
            <label for="f">Female</label><br><br>

            <button type="submit">Register</button>
        </form>
    </main>
    
    <footer>
        <p>&copy; 2026 UniCore University. All Rights Reserved.</p>  
    </footer>
</body> 
</html>
